<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#062451">
  <title>韓国発送ガイド</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <main class="login-page">
    <section class="login-intro-screen">
      <img class="login-main-image" src="assets/images/login-bg-clean.jpg" alt="韓国の街並み">
      <div class="login-intro-content">
        <h1>韓国発送ガイド</h1>
        <p>発送ガイドをご案内します。</p>
        <button id="showLogin" class="btn primary login-open-btn" type="button" aria-controls="passwordModal" aria-expanded="false">発送ガイドを開く</button>
      </div>
    </section>

    <div id="passwordModal" class="login-modal hide" aria-hidden="true">
      <div class="login-modal-backdrop" data-close-login></div>
      <section class="loginbox login-modal-card" role="dialog" aria-modal="true" aria-labelledby="passwordTitle">
        <button class="login-modal-close" type="button" aria-label="閉じる" data-close-login>×</button>
        <p id="passwordTitle" class="password-title">パスワードを入力してください</p>
        <form id="loginForm">
          <div class="form"><input id="password" type="password" autocomplete="current-password" placeholder="パスワード" aria-label="パスワード"></div>
          <button class="btn primary" type="submit">ログイン</button>
          <p id="error" class="err" role="alert"></p>
        </form>
      </section>
    </div>
  </main>
  <script src="assets/js/app.js"></script>
</body>
</html>
