<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>STEP3</title><link rel="stylesheet" href="assets/css/style.css"></head><body><header><div class="head"><a class="brand" href="home.html">韓国発送ガイド</a><button class="menu">☰</button><nav class="nav"><a href="home.html">ホーム</a><a href="step0.html">STEP0</a><a href="step1.html">STEP1</a><a href="step2.html">STEP2</a><a href="step3.html">STEP3</a><a href="step4.html">STEP4</a><a href="step5.html">STEP5</a></nav></div></header><main><section class="hero"><span class="badge">STEP3</span><h1>集荷予約</h1><p>希望日と希望時間を選択して、韓国語メッセージを作成します。</p></section><section class="card"><div class="form"><label>集荷希望日</label><input id="pickupDate" type="date"></div><div class="form"><label>集荷希望時間</label><select id="pickupTime"><option value="">選択してください</option></select></div><div class="note">当日も選択できますが、発送業者の都合によっては当日の集荷が難しい場合があります。</div><button class="btn primary" style="margin-top:15px" onclick="pickup()">予約メッセージを作成</button></section><section id="pickupOutput" class="card hide"><h2>予約メッセージ</h2><div id="pickupMessage" class="preview"></div><button class="btn primary" style="margin-top:12px" onclick="copyText('pickupMessage')">コピーする</button><div id="copyStatus" class="ok hide" style="margin-top:10px">コピーしました。</div><div class="actions two"><a class="btn outline" href="reference.html">参考写真を見る</a><a class="btn primary" href="step4.html">次のSTEPへ</a></div></section></main><footer>韓国発送ガイド</footer><script src="assets/js/config.js"></script><script src="assets/js/app.js"></script></body></html>
