<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#062451">
  <title>韓国発送ガイド</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <main class="login login-final">
    <section class="login-visual" aria-label="韓国発送ガイド ログイン">
      <img class="login-final-image" src="assets/images/login-bg-clean.jpg" alt="韓国の夜の街並み">
      <div class="login-overlay"></div>
      <section class="loginbox login-final-card">
        <h1>韓国発送ガイド</h1>
        <p class="login-final-description">発送ガイドをご利用いただくには、<br>パスワードを入力してください。</p>
        <form id="loginForm">
          <div class="form">
            <label class="sr-only" for="password">パスワード</label>
            <input id="password" type="password" autocomplete="current-password" placeholder="パスワードを入力" aria-label="パスワード" required>
          </div>
          <button class="btn primary" type="submit">ログイン</button>
          <p id="error" class="err" role="alert" aria-live="polite"></p>
        </form>
      </section>
    </section>
  </main>
  <script src="assets/js/app.js"></script>
</body>
</html>
