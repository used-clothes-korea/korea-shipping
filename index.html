<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#062451">
  <title>韓国発送ガイド</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <main class="login">
    <section class="loginbox login-intro">
      <h1>韓国発送ガイド</h1>
      <p class="login-description">発送手順をご案内します。</p>
      <button id="showLogin" class="btn primary" type="button" aria-controls="passwordPanel" aria-expanded="false">発送ガイドを開く</button>

      <div id="passwordPanel" class="password-panel hide" aria-hidden="true">
        <p class="password-title">パスワードを入力してください</p>
        <form id="loginForm">
          <div class="form"><input id="password" type="password" autocomplete="current-password" placeholder="パスワード" aria-label="パスワード"></div>
          <button class="btn primary" type="submit">ログイン</button>
          <p id="error" class="err" role="alert"></p>
        </form>
      </div>
    </section>
  </main>
  <script src="assets/js/app.js"></script>
</body>
</html>
