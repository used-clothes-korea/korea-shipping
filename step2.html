<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#062451"><title>STEP2 ラベルの貼り方</title><link rel="stylesheet" href="assets/css/style.css"></head><body data-protected="true"><header><div class="head"><a class="brand" href="home.html">韓国発送ガイド</a><button class="menu" aria-label="メニュー">☰</button><nav class="nav"><a href="home.html">ホーム</a><a href="step0.html">STEP0</a><a href="step1.html">STEP1</a><a href="step2.html">STEP2</a><a href="step3.html">STEP3</a><a href="step4.html">STEP4</a><a href="reference.html">参考写真</a><a href="kakao-send.html">Kakao送信</a><a href="kakao-translate.html">翻訳</a></nav></div></header><main><section class="hero"><span class="badge">STEP2</span><h1>ラベルの貼り方</h1><p>ラベルを荷物の見やすい場所へ貼り付けます。</p></section><section class="card"><div class="image-card bag-photo"><img src="assets/images/bags-photo.jpg" alt="ラベルを貼った3個の発送袋"><div class="caption">このようにラベルを貼ってください</div></div><div class="steps"><div class="row"><div class="num">1</div><div><strong>同じラベルをすべての荷物に貼る</strong><p>同じ人が送る荷物には、すべて同じラベルを貼ってください。</p></div></div><div class="row"><div class="num">2</div><div><strong>透明テープで覆う</strong><p>ラベル全体を透明テープで覆い、濡れても大丈夫なようにしっかり貼り付けてください。</p></div></div></div><div class="warn"><strong>重要</strong><br>ラベルが剥がれたり、濡れて文字が読めなくなると、荷物を判別できず発送できない場合があります。必ず透明テープでしっかり貼り付けてください。</div><div class="actions"><a class="btn primary" href="step3.html">次のSTEPへ</a></div></section></main><footer>韓国発送ガイド</footer><script src="assets/js/config.js"></script><script src="assets/js/app.js"></script></body></html>
