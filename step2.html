<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#062451"><title>STEP2 ラベルの貼り方</title><link rel="stylesheet" href="assets/css/style.css"></head><body data-protected="true"><header><div class="head"><a class="brand" href="home.html">韓国発送ガイド</a><button class="menu" aria-label="メニュー">☰</button><nav class="nav"><a href="home.html">ホーム</a><a href="step0.html">STEP0</a><a href="step1.html">STEP1</a><a href="step2.html">STEP2</a><a href="step3.html">STEP3</a><a href="step4.html">STEP4</a><a href="step5.html">STEP5</a><a href="reference.html">参考写真</a><a href="kakao-send.html">Kakao送信</a><a href="kakao-translate.html">翻訳</a></nav></div></header><main><section class="hero"><span class="badge">STEP2</span><h1>ラベルの貼り方</h1><p>同じ人の荷物には、すべて同じラベルを貼ってください。</p></section><section class="card"><div class="image-card"><img src="assets/images/bags-guide.png" alt="白い発送袋3個へのラベルの貼り方"><div class="caption">3袋すべてに同じラベルを貼る例</div></div><div class="steps"><div class="row"><div class="num">1</div><div><strong>見やすい場所に貼る</strong><p>袋の正面など、すぐ確認できる場所に貼ります。</p></div></div><div class="row"><div class="num">2</div><div><strong>透明テープで固定</strong><p>雨や擦れで剥がれないよう、透明テープでしっかり固定してください。</p></div></div><div class="row"><div class="num">3</div><div><strong>全袋を確認</strong><p>同じ人の荷物に違う名前や番号が混ざっていないか確認します。</p></div></div></div><div class="warn">ラベルが剥がれると、配送の遅延や紛失につながる可能性があります。</div><div class="actions"><a class="btn primary" href="step3.html">次のSTEPへ</a></div></section></main><footer>韓国発送ガイド</footer><script src="assets/js/config.js"></script><script src="assets/js/app.js"></script></body></html>
