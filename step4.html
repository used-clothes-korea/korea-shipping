<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>STEP4</title><link rel="stylesheet" href="assets/css/style.css"></head><body><header><div class="head"><a class="brand" href="home.html">韓国発送ガイド</a><button class="menu">☰</button><nav class="nav"><a href="home.html">ホーム</a><a href="step0.html">STEP0</a><a href="step1.html">STEP1</a><a href="step2.html">STEP2</a><a href="step3.html">STEP3</a><a href="step4.html">STEP4</a><a href="step5.html">STEP5</a></nav></div></header><main><section class="hero"><span class="badge">STEP4</span><h1>発送先情報を入力する</h1><p>発送先情報を英語で入力してください。</p></section><section class="card"><div class="form"><label>名前（英語）<span class="req">必須</span></label><input id="name" placeholder="YUTA YAMADA"></div><div class="form"><label>郵便番号<span class="req">必須</span></label><input id="postal" placeholder="861-1234"></div><div class="form"><label>住所（英語）<span class="req">必須</span></label><div class="note">変換サイトで日本語住所を英語へ変換し、コピーして下の入力欄へ貼り付けてください。</div><a data-judress target="_blank" class="btn green" style="margin:12px 0">住所を英語へ変換する（JuDress）</a><textarea id="address" placeholder="1-2-3 Chuo-machi, Kumamoto-shi, Kumamoto, 861-1234, Japan"></textarea><div class="hint">カンマ（,）区切りで貼り付けてください。</div></div><div class="form"><label>電話番号<span class="req">必須</span></label><input id="phone" placeholder="09012345678"></div><button class="btn primary" onclick="saveShip()">発送メッセージを作成する</button></section></main><footer>韓国発送ガイド</footer><script src="assets/js/config.js"></script><script src="assets/js/app.js"></script></body></html>
